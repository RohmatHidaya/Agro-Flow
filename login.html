<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login AgroFlow</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Poppins", sans-serif;
      }

      body {
        background: linear-gradient(
          135deg,
          #f5fff5 0%,
          #e8f5e9 50%,
          #dcedc8 100%
        );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
      }

      .login-wrapper {
        width: 100%;
        max-width: 1100px;
        background: white;
        border-radius: 30px;
        overflow: hidden;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
      }

      .login-left {
        background: linear-gradient(
          135deg,
          #2e7d32 0%,
          #43a047 50%,
          #66bb6a 100%
        );
        padding: 60px;
        color: white;
        position: relative;
      }

      .login-left h1 {
        font-size: 42px;
        font-weight: 700;
      }

      .login-left p {
        margin-top: 20px;
        color: rgba(255, 255, 255, 0.9);
        line-height: 1.8;
      }

      .login-left img {
        width: 100%;
        margin-top: 40px;
      }

      .login-right {
        padding: 70px 60px;
      }

      .brand {
        font-size: 30px;
        font-weight: 700;
        color: #2e7d32;
      }

      .subtitle {
        color: #777;
        margin-bottom: 35px;
      }

      .form-label {
        font-weight: 500;
        color: #333;
      }

      .form-control {
        height: 55px;
        border-radius: 14px;
        border: 1px solid #dcdcdc;
        padding: 0 18px;
      }

      .form-control:focus {
        border-color: #43a047;
        box-shadow: 0 0 0 0.2rem rgba(67, 160, 71, 0.15);
      }

      .btn-login {
        height: 55px;
        border-radius: 14px;
        background: #2e7d32;
        border: none;
        font-weight: 600;
        transition: 0.3s;
      }

      .btn-login:hover {
        background: #256628;
      }

      .extra-link {
        color: #2e7d32;
        text-decoration: none;
        font-weight: 500;
      }

      .extra-link:hover {
        text-decoration: underline;
      }

      .divider {
        text-align: center;
        margin: 25px 0;
        color: #999;
        position: relative;
      }

      .divider::before,
      .divider::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 40%;
        height: 1px;
        background: #ddd;
      }

      .divider::before {
        left: 0;
      }

      .divider::after {
        right: 0;
      }

      .social-btn {
        height: 52px;
        border-radius: 14px;
        border: 1px solid #ddd;
        background: white;
        font-weight: 500;
        transition: 0.3s;
      }

      .social-btn:hover {
        background: #f7f7f7;
      }

      @media (max-width: 992px) {
        .login-left {
          display: none;
        }

        .login-right {
          padding: 45px 30px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="login-wrapper row g-0">
        <!-- Left -->
        <div class="col-lg-6 login-left">
          <h1>AgroFlow</h1>

          <p>
            Kelola aktivitas pertanian modern dengan lebih mudah, efisien, dan
            terintegrasi dalam satu platform digital.
          </p>

          <img
            src="https://cdn-icons-png.flaticon.com/512/628/628324.png"
            alt="Agro"
          />
        </div>

        <!-- Right -->
        <div class="col-lg-6 login-right">
          <div class="brand">Selamat Datang 👋</div>

          <p class="subtitle">Silakan login untuk melanjutkan ke AgroFlow</p>

          <form action="index.html">
            <div class="mb-4">
              <label class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                placeholder="Masukkan email"
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                placeholder="Masukkan password"
              />
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember" />
                <label class="form-check-label" for="remember">
                  Ingat saya
                </label>
              </div>

              <a href="#" class="extra-link">Lupa password?</a>
            </div>

            <button class="btn btn-success w-100 btn-login" type="submit">
              Masuk
            </button>

            <div class="divider">atau</div>

            <button
              type="button"
              class="btn social-btn w-100 d-flex align-items-center justify-content-center gap-2"
            >
              <img
                src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
                alt="Google"
                width="20"
                height="20"
              />
              Login dengan Google
            </button>

            <p class="text-center mt-4">
              Belum punya akun?
              <a href="register.html" class="extra-link">Daftar sekarang</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
