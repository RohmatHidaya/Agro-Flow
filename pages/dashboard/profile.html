<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Petani - Agro Flow</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body class="bg-light">
    <div class="container py-5">
      <div class="mb-4">
        <a href="dashboard.html" class="btn btn-outline-success">
          <i class="bi bi-arrow-left"></i>
          Kembali ke Dashboard
        </a>
      </div>
      <div class="row">
        <!-- PROFILE -->
        <div class="col-lg-4">
          <div class="card shadow-sm border-0">
            <div class="card-body text-center">
              <i class="bi bi-person-circle display-1 text-success"></i>

              <h4 class="mt-3">Rohmat Hidayat Yusuf</h4>

              <p class="text-muted">Petani / Pengguna Agro Flow</p>

              <hr />

              <p>
                <i class="bi bi-envelope"></i>
                rohmat@email.com
              </p>

              <p>
                <i class="bi bi-telephone"></i>
                08123456789
              </p>
            </div>
          </div>
        </div>

        <!-- DATA LAHAN -->
        <div class="col-lg-8">
          <div class="card shadow-sm border-0">
            <div class="card-header bg-success text-white">
              <h5 class="mb-0">
                <i class="bi bi-tree-fill"></i>
                Data Lahan Pertanian
              </h5>
            </div>

            <div class="card-body">
              <form>
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Nama Lahan</label>
                    <input
                      type="text"
                      class="form-control"
                      placeholder="Contoh: Sawah Utara"
                    />
                  </div>

                  <div class="col-md-6 mb-3">
                    <label class="form-label">Luas Lahan (Ha)</label>
                    <input
                      type="number"
                      class="form-control"
                      placeholder="0.5"
                    />
                  </div>

                  <div class="col-md-6 mb-3">
                    <label class="form-label">Lokasi</label>
                    <input
                      type="text"
                      class="form-control"
                      placeholder="Desa / Kecamatan"
                    />
                  </div>

                  <div class="col-md-6 mb-3">
                    <label class="form-label">Jenis Tanah</label>
                    <select class="form-select">
                      <option>Pilih</option>
                      <option>Latosol</option>
                      <option>Andosol</option>
                      <option>Aluvial</option>
                      <option>Regosol</option>
                    </select>
                  </div>

                  <div class="col-md-6 mb-3">
                    <label class="form-label">Komoditas</label>
                    <select class="form-select">
                      <option>Pilih</option>
                      <option>Padi</option>
                      <option>Jagung</option>
                      <option>Singkong</option>
                      <option>Kedelai</option>
                      <option>Cabai</option>
                    </select>
                  </div>

                  <div class="col-md-6 mb-3">
                    <label class="form-label">Sumber Air</label>
                    <select class="form-select">
                      <option>Pilih</option>
                      <option>Irigasi</option>
                      <option>Sumur</option>
                      <option>Sungai</option>
                      <option>Air Hujan</option>
                    </select>
                  </div>

                  <div class="col-12 mb-3">
                    <label class="form-label">Catatan</label>
                    <textarea
                      class="form-control"
                      rows="4"
                      placeholder="Kondisi lahan, pupuk, kendala, dll."
                    ></textarea>
                  </div>
                </div>

                <button class="btn btn-success">
                  <i class="bi bi-save"></i>
                  Simpan Data Lahan
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
